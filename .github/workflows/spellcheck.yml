name: Spell check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**/*.md"
      - "docs/**/*.mdx"
      - "README.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "cspell.json"
      - ".github/workflows/spellcheck.yml"
  pull_request:
    branches:
      - main
    paths:
      - "docs/**/*.md"
      - "docs/**/*.mdx"
      - "README.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "cspell.json"
      - ".github/workflows/spellcheck.yml"

concurrency:
  group: "${{ github.workflow }}@${{ github.head_ref || github.ref_name }}"
  cancel-in-progress: true

permissions: {}

jobs:
  spellcheck:
    name: Spell check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      # related to postmanlabs/postman-code-generators#792
      - name: Uninstall yarn
        run: sudo rm -f $(which yarn)

      - name: Install dependencies
        run: pnpm install

      - name: Run spell check
        run: pnpm spellcheck
