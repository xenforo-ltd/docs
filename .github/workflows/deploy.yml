name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: "${{ github.workflow }}@${{ github.head_ref || github.ref_name }}"
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"

      # related to postmanlabs/postman-code-generators#792
      - name: Uninstall yarn
        run: sudo rm -f $(which yarn)

      - name: Install dependencies
        run: pnpm install

      - name: Build website
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build

  deploy:
    name: Deploy
    needs: build

    permissions:
      pages: write # required to deploy to GitHub Pages
      id-token: write # required to verify deployment source

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  recrawl:
    name: Algolia recrawl
    needs: deploy
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Check for documentation changes
        id: docs-changed
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -qE '^docs/.*\.(md|mdx)$|^docusaurus\.config\.|^sidebars\.'; then
            echo "docs_changed=true" >> $GITHUB_OUTPUT
            echo "Documentation changes detected - will trigger recrawl"
          else
            echo "docs_changed=false" >> $GITHUB_OUTPUT
            echo "No documentation changes - skipping recrawl"
          fi

      - name: Trigger Algolia Crawler reindex
        if: steps.docs-changed.outputs.docs_changed == 'true'
        env:
          CRAWLER_USER_ID: ${{ secrets.CRAWLER_USER_ID }}
          CRAWLER_API_KEY: ${{ secrets.CRAWLER_API_KEY }}
          CRAWLER_ID: ${{ secrets.CRAWLER_ID }}
        run: |
          AUTH=$(printf '%s:%s' "${CRAWLER_USER_ID}" "${CRAWLER_API_KEY}" | base64 -w 0)

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://crawler.algolia.com/api/1/crawlers/${CRAWLER_ID}/reindex" \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Algolia crawler reindex triggered successfully"
          else
            echo "Failed to trigger Algolia crawler reindex"
            exit 1
          fi
